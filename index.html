<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noble Hadith - দৈনিক হাদিস</title>
    <meta name="description" content="প্রতিদিন একটি সহিহ হাদিস ও ইসলামিক জ্ঞান">
    <link rel="canonical" href="https://noblehadith.github.io/" id="canonical">
    <meta property="og:title" content="Noble Hadith">
    <meta property="og:description" content="প্রতিদিনের হাদিস">
    <meta property="og:image" content="https://noblehadith.github.io/og-image.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <script type="application/ld+json" id="website-ld">
    {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Noble Hadith",
        "url": "https://noblehadith.github.io",
        "description": "দৈনিক হাদিস ও ইসলামিক বার্তা"
    }
    </script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'SolaimanLipi',Arial,sans-serif;background:#f4f7f9;padding:20px}
        .container{max-width:800px;margin:auto}
        header{text-align:center;margin-bottom:20px}
        .logo{font-size:32px;font-weight:bold;color:#0f766e}
        .subtitle{color:#666}
        .card{background:#fff;padding:25px;border-radius:15px;box-shadow:0 5px 15px rgba(0,0,0,.08)}
        .date{color:#0f766e;font-weight:bold;margin-bottom:15px}
        h1{font-size:28px;margin-bottom:20px}
        .content{font-size:20px;line-height:1.9;text-align:justify}
        .source{margin-top:25px;padding-top:15px;border-top:1px solid #ddd;font-weight:bold}
        footer{text-align:center;margin-top:25px;color:#777;font-size:14px}
        nav{margin-top:20px;display:flex;justify-content:center;gap:20px}
        nav a{color:#0f766e;text-decoration:none}
        @media (max-width:600px){body{padding:12px}h1{font-size:24px}}
    </style>
</head>
<body>
<div class="container">
    <header><div class="logo">Noble Hadith</div><div class="subtitle">দৈনিক ইসলামিক বার্তা</div></header>
    <main>
        <article class="card" id="article-card">
            <div class="date" id="date">লোড হচ্ছে...</div>
            <h1 id="title">লোড হচ্ছে...</h1>
            <div class="content" id="content">লোড হচ্ছে...</div>
            <div class="source" id="source"></div>
        </article>
    </main>
    <footer>
        <nav>
            <a href="/">হোম</a>
            <a href="/archive.html">আর্কাইভ</a>
            <a href="/about.html">পরিচিতি</a>
        </nav>
        <p>সম্পাদনা ও যাচাই: Noble Hadith Research Team | সূত্র: সহিহ বুখারী, মুসলিম, আবু দাউদ, তিরমিযী</p>
        <p>&copy; Noble Hadith</p>
    </footer>
</div>

<script>
    // Router: /date/2026-06-13 অথবা /hadith/2026-06-13 সাপোর্ট করে
    async function loadHadith() {
        let path = window.location.pathname;
        let match = path.match(/\/(?:date|hadith)\/(\d{4}-\d{2}-\d{2})/);
        let requestedDate = match ? match[1] : null;

        try {
            const res = await fetch('/posts.json');
            const posts = await res.json();
            const today = new Date().toISOString().slice(0,10);
            const targetDate = requestedDate || today;
            const post = posts.find(p => p.date === targetDate);

            if (post) {
                document.getElementById('date').innerText = 'তারিখ: ' + post.date;
                document.getElementById('title').innerText = post.title;
                document.getElementById('content').innerText = post.content;
                document.getElementById('source').innerHTML = 'উৎস: ' + post.source;
                document.title = post.title + ' | Noble Hadith';
                document.querySelector('meta[name="description"]')?.setAttribute('content', post.content.slice(0,160));
                document.getElementById('canonical')?.setAttribute('href', `https://noblehadith.github.io/date/${post.date}`);
                // JSON-LD Article update
                const articleJson = {
                    "@context":"https://schema.org",
                    "@type":"Article",
                    "headline":post.title,
                    "description":post.content.slice(0,200),
                    "author":{"@type":"Organization","name":"Noble Hadith"},
                    "datePublished":post.date,
                    "articleBody":post.content,
                    "citation":post.source
                };
                let script = document.getElementById('article-ld');
                if(!script){ script = document.createElement('script'); script.id='article-ld'; script.type='application/ld+json'; document.head.appendChild(script); }
                script.textContent = JSON.stringify(articleJson);
            } else {
                document.getElementById('title').innerText = 'হাদিস পাওয়া যায়নি';
                document.getElementById('content').innerHTML = `'${targetDate}' তারিখের কোনো হাদিস নেই। <a href="/archive.html">আর্কাইভ দেখুন</a>।`;
                document.getElementById('date').innerText = '';
                document.getElementById('source').innerHTML = '';
                document.title = 'হাদিস নেই | Noble Hadith';
            }
        } catch(e) {
            document.getElementById('title').innerText = 'লোডিং ত্রুটি';
            document.getElementById('content').innerText = 'পরে আবার চেষ্টা করুন।';
        }
    }
    loadHadith();
</script>
</body>
</html>
