<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    
    <!-- Primary SEO Meta Tags -->
    <title>Noble Hadith | দৈনিক হাদিস ও ইসলামিক বার্তা</title>
    <meta name="description" content="প্রতিদিন একটি নির্ভরযোগ্য হাদিস ও ইসলামিক জ্ঞান লাভ করুন। কুরআন ও সুন্নাহ ভিত্তিক দৈনিক নির্দেশনা।">
    <meta name="keywords" content="হাদিস, দৈনিক হাদিস, ইসলামিক বার্তা, noble hadith, হাদিস বাংলা, সহিহ হাদিস">
    <meta name="author" content="Noble Hadith">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://www.noblehadith.com/">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Noble Hadith - দৈনিক হাদিস">
    <meta property="og:description" content="প্রতিদিন একটি নির্ভরযোগ্য হাদিস ও ইসলামিক জ্ঞান লাভ করুন।">
    <meta property="og:image" content="https://www.noblehadith.com/og-image.jpg">
    <meta property="og:site_name" content="Noble Hadith">
    <meta property="og:locale" content="bn_BD">
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Noble Hadith - দৈনিক হাদিস">
    <meta name="twitter:description" content="প্রতিদিন একটি নির্ভরযোগ্য হাদিস ও ইসলামিক জ্ঞান লাভ করুন।">
    
    <!-- Structured Data: Website (static) -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Noble Hadith",
        "url": "https://www.noblehadith.com",
        "description": "দৈনিক হাদিস ও ইসলামিক বার্তা",
        "inLanguage": "bn"
    }
    </script>
    
    <!-- Structured Data: Article (will be updated dynamically) -->
    <script type="application/ld+json" id="article-ld-json">
    {
        "@context": "https://schema.org",
        "@type": "Article",
        "headline": "আজকের হাদিস",
        "author": {
            "@type": "Organization",
            "name": "Noble Hadith"
        },
        "publisher": {
            "@type": "Organization",
            "name": "Noble Hadith",
            "logo": {
                "@type": "ImageObject",
                "url": "https://www.noblehadith.com/logo.png"
            }
        },
        "datePublished": "2026-06-13"
    }
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'SolaimanLipi', Arial, sans-serif;
            background: #f4f7f9;
            padding: 20px;
            color: #222;
        }
        .container {
            max-width: 800px;
            margin: auto;
        }
        header {
            text-align: center;
            margin-bottom: 20px;
        }
        .logo {
            font-size: 32px;
            font-weight: bold;
            color: #0f766e;
        }
        .subtitle {
            color: #666;
            margin-top: 5px;
        }
        .card {
            background: #fff;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,.08);
        }
        .date {
            color: #0f766e;
            font-weight: bold;
            margin-bottom: 15px;
        }
        h1 {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .content {
            font-size: 20px;
            line-height: 1.9;
            text-align: justify;
        }
        .source {
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px solid #ddd;
            font-weight: bold;
            color: #555;
        }
        footer {
            text-align: center;
            margin-top: 25px;
            color: #777;
            font-size: 14px;
        }
        @media (max-width: 600px) {
            body { padding: 12px; }
            .card { padding: 18px; }
            h1 { font-size: 24px; }
            .content { font-size: 18px; }
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <div class="logo">Noble Hadith</div>
        <div class="subtitle">দৈনিক ইসলামিক বার্তা</div>
    </header>

    <main>
        <article class="card">
            <div class="date" id="date">লোড হচ্ছে...</div>
            <h1 id="title">লোড হচ্ছে...</h1>
            <div class="content" id="content">লোড হচ্ছে...</div>
            <div class="source" id="source">লোড হচ্ছে...</div>
        </article>
    </main>

    <footer>
        &copy; Noble Hadith
    </footer>
</div>

<script>
    // Function to update JSON-LD for Article
    function updateArticleStructuredData(title, content, date, source) {
        const script = document.getElementById('article-ld-json');
        if (script) {
            const newData = {
                "@context": "https://schema.org",
                "@type": "Article",
                "headline": title,
                "description": content.substring(0, 200),
                "author": { "@type": "Organization", "name": "Noble Hadith" },
                "publisher": { "@type": "Organization", "name": "Noble Hadith" },
                "datePublished": date,
                "articleBody": content,
                "citation": source
            };
            script.textContent = JSON.stringify(newData);
        }
    }

    // Fetch and display hadith
    fetch("posts.json")
        .then(response => {
            if (!response.ok) throw new Error("Network response error");
            return response.json();
        })
        .then(posts => {
            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            const currentDate = `${yyyy}-${mm}-${dd}`;
            const post = posts.find(item => item.date === currentDate);

            if (post) {
                document.getElementById("date").innerText = "তারিখ: " + post.date;
                document.getElementById("title").innerText = post.title;
                document.getElementById("content").innerText = post.content;
                document.getElementById("source").innerText = "উৎস: " + post.source;
                // Update structured data
                updateArticleStructuredData(post.title, post.content, post.date, post.source);
                // Update page title
                document.title = post.title + " | Noble Hadith";
                // Update meta description
                const metaDesc = document.querySelector('meta[name="description"]');
                if (metaDesc) metaDesc.setAttribute("content", post.content.substring(0, 160) + " - Noble Hadith");
            } else {
                document.getElementById("date").innerText = currentDate;
                document.getElementById("title").innerText = "আজকের জন্য কোনো পোস্ট নেই";
                document.getElementById("content").innerText = "অনুগ্রহ করে পরে আবার দেখুন।";
                document.getElementById("source").innerText = "";
                document.title = "আজকের হাদিস নেই | Noble Hadith";
            }
        })
        .catch(error => {
            console.error("Error:", error);
            document.getElementById("title").innerText = "ডেটা লোড করা যায়নি";
            document.getElementById("content").innerText = "সার্ভার বা ফাইল লোড করতে সমস্যা হচ্ছে।";
            document.getElementById("date").innerText = "";
            document.getElementById("source").innerText = "";
            document.title = "সার্ভার সমস্যা | Noble Hadith";
        });
</script>
</body>
</html>
